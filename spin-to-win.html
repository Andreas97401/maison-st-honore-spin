<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maison St Honoré — Spin to Win</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN TOKENS ───────────────────────────── */
    :root {
      --bg:        #FEFAF4;
      --text:      #2C2415;
      --gold:      #C8A96E;
      --gold-lt:   #F0E6D0;
      --gold-dk:   #8A6A2A;
      --dark:      #1C2436;
      --muted:     #7A6A58;
      --radius:    2px;
      --serif:     'Playfair Display', Georgia, serif;
      --sans:      'Inter', system-ui, sans-serif;
    }

    /* ── RESET ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ──────────────────────────────────── */
    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 48px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── STATE VISIBILITY ────────────────────────── */
    .state { display: none; width: 100%; }
    .state.active { display: flex; flex-direction: column; align-items: center; gap: 24px; }

    /* ── LOGO ────────────────────────────────────── */
    .logo { width: 120px; height: 120px; object-fit: contain; }

    /* ── TAGLINE ─────────────────────────────────── */
    .tagline {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* ── FORM ────────────────────────────────────── */
    .form-group { width: 100%; display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--gold);
      border-radius: var(--radius);
      background: var(--bg);
      font-family: var(--sans);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold-dk); }
    input.error { border-color: #C0392B; }
    .field-error { font-size: 0.75rem; color: #C0392B; min-height: 1em; }

    /* ── BUTTON ──────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--text);
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 600;
      border: 1.5px solid var(--gold);
      border-radius: var(--radius);
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: var(--gold-lt); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── DIVIDER ─────────────────────────────────── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 4px auto;
    }

    /* ── WHEEL SECTION ───────────────────────────── */
    .wheel-wrap {
      position: relative;
      width: 280px;
      height: 280px;
    }
    #wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }
    .pointer {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 22px solid var(--gold);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    /* ── SPIN LABEL ──────────────────────────────── */
    .spin-label {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── RESULT ──────────────────────────────────── */
    .result-heading {
      font-family: var(--serif);
      font-size: 1.9rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.2;
      color: var(--text);
    }
    .prize-card {
      width: 100%;
      padding: 24px;
      background: var(--gold-lt);
      border: 1.5px solid var(--gold);
      border-radius: var(--radius);
      text-align: center;
    }
    .prize-card .prize-name {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
    }
    .result-instruction {
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
    .result-email-note {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      font-style: italic;
    }
    .result-fallback {
      font-size: 0.78rem;
      color: #C0392B;
      text-align: center;
      display: none;
    }

    /* ── FADE ANIMATION ──────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .state.active { animation: fadeIn 0.5s ease both; }
  </style>
</head>

      { name: "Free Macaron",      weight:  8, color: "#8A6A2A", textColor: "#FEFAF4" },
      { name: "Free Drink",        weight:  5, color: "#1C2436", textColor: "#FEFAF4" },
    ];

    // ── STATE MANAGEMENT ──────────────────────────────────────────────
    function showState(id) {
      document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── FORM VALIDATION ───────────────────────────────────────────────
    function validateForm() {
      let valid = true;

      const fields = [
        { id: 'firstName', errId: 'err-firstName', label: 'First name is required.' },
        { id: 'lastName',  errId: 'err-lastName',  label: 'Last name is required.'  },
        { id: 'phone',     errId: 'err-phone',     label: 'Phone is required.'      },
        { id: 'email',     errId: 'err-email',     label: 'Email is required.'      },
      ];

      fields.forEach(({ id, errId, label }) => {
        const input = document.getElementById(id);
        const err   = document.getElementById(errId);
        input.classList.remove('error');
        err.textContent = '';

        if (!input.value.trim()) {
          input.classList.add('error');
          err.textContent = label;
          valid = false;
        }
      });

      // extra: email format check
      const emailInput = document.getElementById('email');
      const emailErr   = document.getElementById('err-email');
      if (emailInput.value.trim() && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim())) {
        emailInput.classList.add('error');
        emailErr.textContent = 'Please enter a valid email address.';
        valid = false;
      }

      return valid;
    }

    // ── HANDLE SUBMIT ─────────────────────────────────────────────────
    async function handleSubmit() {
      if (!validateForm()) return;

      const btn = document.getElementById('btn-spin');
      btn.disabled = true;
      btn.textContent = 'Checking…';

      const email = document.getElementById('email').value.trim();

      try {
        const res  = await fetch(`${GAS_URL}?action=check&email=${encodeURIComponent(email)}`);
        const data = await res.json();

        if (!data.ok && data.reason === 'duplicate') {
          document.getElementById('email').classList.add('error');
          document.getElementById('err-email').textContent = 'This email has already been used.';
          btn.disabled = false;
          btn.textContent = 'Spin to Win';
          return;
        }

        // GAS confirmed OK — proceed to spin
        startSpin();
      } catch (e) {
        document.getElementById('err-email').textContent = 'Something went wrong. Please try again.';
        document.getElementById('err-email').style.color = '#C0392B';
        btn.disabled = false;
        btn.textContent = 'Spin to Win';
      }
    }

    // ── WHEEL BUILDER ─────────────────────────────────────────────────
    // Converts a clockwise-from-top angle (deg) to SVG x,y on the rim
    // cx=100, cy=100 (center of 200x200 viewBox), r=96
    const CX = 100, CY = 100, R = 96, TEXT_R = 68;

    function polarToXY(angleDeg, radius) {
      const rad = (angleDeg - 90) * (Math.PI / 180); // -90 rotates 0° to top
      return {
        x: CX + radius * Math.cos(rad),
        y: CY + radius * Math.sin(rad),
      };
    }

    function buildSegmentPath(startAngle, endAngle) {
      const start   = polarToXY(startAngle, R);
      const end     = polarToXY(endAngle, R);
      const large   = endAngle - startAngle > 180 ? 1 : 0;
      return `M ${CX} ${CY} L ${start.x} ${start.y} A ${R} ${R} 0 ${large} 1 ${end.x} ${end.y} Z`;
    }

    function buildWheel() {
      const totalWeight = PRIZES.reduce((s, p) => s + p.weight, 0);
      const svg = document.getElementById('wheel');
      svg.innerHTML = '';

      let currentAngle = 0;
      PRIZES.forEach((prize, i) => {
        const sliceDeg  = (prize.weight / totalWeight) * 360;
        const endAngle  = currentAngle + sliceDeg;
        const midAngle  = currentAngle + sliceDeg / 2;

        // Segment path
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', buildSegmentPath(currentAngle, endAngle));
        path.setAttribute('fill', prize.color);
        path.setAttribute('stroke', '#FEFAF4');
        path.setAttribute('stroke-width', '1.5');
        svg.appendChild(path);

        // Text label — split on space, max 2 lines
        const mid     = polarToXY(midAngle, TEXT_R);
        const words   = prize.name.split(' ');
        const lines   = words.length > 2
          ? [words.slice(0, Math.ceil(words.length / 2)).join(' '), words.slice(Math.ceil(words.length / 2)).join(' ')]
          : words.length === 1 ? [words[0]] : words;

        const textG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        textG.setAttribute('transform', `rotate(${midAngle}, ${CX}, ${CY})`);

        lines.forEach((line, li) => {
          const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          t.setAttribute('x', CX);
          t.setAttribute('y', CY - TEXT_R + (li - (lines.length - 1) / 2) * 11);
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('dominant-baseline', 'middle');
          t.setAttribute('font-family', 'Inter, sans-serif');
          t.setAttribute('font-size', '7.5');
          t.setAttribute('font-weight', '500');
          t.setAttribute('fill', prize.textColor);
          t.textContent = line;
          textG.appendChild(t);
        });
        svg.appendChild(textG);

        currentAngle = endAngle;
      });

      // Center circle (decorative)
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', CX);
      circle.setAttribute('cy', CY);
      circle.setAttribute('r', '14');
      circle.setAttribute('fill', '#FEFAF4');
      circle.setAttribute('stroke', '#C8A96E');
      circle.setAttribute('stroke-width', '2');
      svg.appendChild(circle);
    }

    // Build wheel on page load
    buildWheel();

    // ── WEIGHTED RANDOM ───────────────────────────────────────────────
    function getWeightedPrize() {
      const total = PRIZES.reduce((s, p) => s + p.weight, 0);
      let rand = Math.random() * total;
      for (const prize of PRIZES) {
        rand -= prize.weight;
        if (rand <= 0) return prize;
      }
      return PRIZES[PRIZES.length - 1];
    }

    // ── SEGMENT START ANGLES ──────────────────────────────────────────
    // Precompute each segment's center angle (clockwise from top)
    function getSegmentCenterAngle(prizeIndex) {
      const totalWeight = PRIZES.reduce((s, p) => s + p.weight, 0);
      let angle = 0;
      for (let i = 0; i < prizeIndex; i++) {
        angle += (PRIZES[i].weight / totalWeight) * 360;
      }
      angle += (PRIZES[prizeIndex].weight / totalWeight) * 360 / 2;
      return angle;
    }

    // ── SPIN ──────────────────────────────────────────────────────────
    let currentRotation = 0; // track total rotation so far

    function startSpin() {
      const prize     = getWeightedPrize();
      const prizeIndex = PRIZES.indexOf(prize);
      const centerAngle = getSegmentCenterAngle(prizeIndex);

      // To land winning segment at top: rotate (360 - centerAngle) + N full turns
      const extraTurns = 5 + Math.floor(Math.random() * 4); // 5–8
      const targetAngle = currentRotation + extraTurns * 360 + (360 - centerAngle % 360);
      currentRotation = targetAngle;

      showState('state-spin');

      // Slight delay so state transition renders before animation begins
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.getElementById('wheel').style.transform = `rotate(${targetAngle}deg)`;
        });
      });

      // Save to GAS in background while wheel spins
      const formData = {
        action:    'save',
        firstName: document.getElementById('firstName').value.trim(),
        lastName:  document.getElementById('lastName').value.trim(),
        phone:     document.getElementById('phone').value.trim(),
        email:     document.getElementById('email').value.trim(),
        prize:     prize.name,
        timestamp: new Date().toISOString(),
      };
      saveToGAS(formData).then(ok => {
        // Store result for after animation completes
        window._gasSaveOk = ok;
      });

      // After animation ends (4s + 300ms buffer), show result
      setTimeout(() => showResult(prize), 4300);
    }

    // ── SHOW RESULT ───────────────────────────────────────────────────
    function showResult(prize) {
      const isNothing = prize.name === 'Nothing';

      document.getElementById('result-heading').textContent = isNothing
        ? `Thank you for playing!`
        : `Congratulations!`;

      if (isNothing) {
        document.getElementById('prize-card').style.display = 'none';
        document.getElementById('result-instruction').textContent =
          'Better luck next time! Come visit us again soon.';
        document.getElementById('result-email-note').textContent =
          'Check your email — you may be able to pick up your loyalty card at the counter.';
      } else {
        document.getElementById('prize-card').style.display = 'block';
        document.getElementById('prize-name').textContent = prize.name;
        document.getElementById('result-instruction').textContent =
          'Show this to our team at the counter to claim your prize.';
        document.getElementById('result-email-note').textContent =
          'A confirmation has been sent to your email.';
      }

      if (window._gasSaveOk === false) {
        document.getElementById('result-fallback').style.display = 'block';
      }

      showState('state-result');
    }

    // ── GAS SAVE ──────────────────────────────────────────────────────
    // Uses Content-Type: text/plain to avoid CORS preflight on POST
    async function saveToGAS(data) {
      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(data),
          headers: { 'Content-Type': 'text/plain' },
        });
        const json = await res.json();
        return json.ok === true;
      } catch (e) {
        return false;
      }
    }
  </script>
</body>
